version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Don't raise PRs for releases younger than this many days — dodges a
    # freshly-poisoned version that gets yanked within hours/days. 1–90; tune to taste.
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
